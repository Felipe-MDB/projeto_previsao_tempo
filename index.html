<!DOCTYPE html>
<html lang="pt-BR">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Weather App</title>

    <link rel="stylesheet" href="css/style.css">
</head>
<body>

    <div class="container">

        <h1>🌤 Weather App</h1>

        <input
            type="text"
            id="cityInput"
            placeholder="Digite uma cidade..."
        >

        <button id="searchBtn">
            🔍 Buscar Clima
        </button>

        <button id="locationBtn">
            📍 Minha Localização
        </button>

        <button id="themeBtn">
            🌙 Alternar Tema
        </button>

        <div id="weatherResult"></div>

        <div id="forecast"></div>

    </div>

    <script src="js/app.js"></script>

</body>
</html>
